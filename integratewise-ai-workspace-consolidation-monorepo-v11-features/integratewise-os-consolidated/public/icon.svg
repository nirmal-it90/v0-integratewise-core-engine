<!-- IntegrateWise Icon - Square optimized version -->
<svg width="32" height="32" viewBox="0 0 144 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IntegrateWise">
  <!-- Main wavy path connecting all 4 nodes -->
  <path 
    d="M 0 40 H 24 Q 48 40 48 16 Q 48 8 48 16 Q 48 40 72 40 Q 96 40 96 64 Q 96 72 96 64 Q 96 40 120 40 H 144" 
    stroke="#3F5195" 
    stroke-width="10" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />
  <!-- Vertical lines to bottom nodes -->
  <path d="M 48 16 L 48 64" stroke="#3F5195" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M 96 64 L 96 16" stroke="#3F5195" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Four circular nodes -->
  <circle cx="0" cy="40" r="12" fill="#3F5195"/>
  <circle cx="48" cy="16" r="12" fill="#3F5195"/>
  <circle cx="48" cy="64" r="12" fill="#3F5195"/>
  <circle cx="144" cy="40" r="12" fill="#3F5195"/>
</svg>
