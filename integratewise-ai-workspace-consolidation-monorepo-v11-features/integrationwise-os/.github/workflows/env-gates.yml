name: Environment Gates

on:
  pull_request:
    branches: [main, uat]
  push:
    branches: [main, uat]

jobs:
  env-check:
    runs-on: ubuntu-latest
    name: Check Required Environment Variables

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load env manifest
        id: manifest
        run: |
          # Extract required variables from manifest
          REQUIRED_VARS=$(jq -r '.variables[] | select(.required == true) | .key' docs/env-manifest.json | tr '\n' ' ')
          echo "required_vars=$REQUIRED_VARS" >> $GITHUB_OUTPUT

      - name: Check Production Secrets
        if: github.ref == 'refs/heads/main'
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MISSING=""

          [ -z "$NEXTAUTH_URL" ] && MISSING="$MISSING NEXTAUTH_URL"
          [ -z "$NEXTAUTH_SECRET" ] && MISSING="$MISSING NEXTAUTH_SECRET"
          [ -z "$GOOGLE_CLIENT_ID" ] && MISSING="$MISSING GOOGLE_CLIENT_ID"
          [ -z "$GOOGLE_CLIENT_SECRET" ] && MISSING="$MISSING GOOGLE_CLIENT_SECRET"
          [ -z "$DATABASE_URL" ] && MISSING="$MISSING DATABASE_URL"
          [ -z "$DATABASE_URL_UNPOOLED" ] && MISSING="$MISSING DATABASE_URL_UNPOOLED"
          [ -z "$XAI_API_KEY" ] && MISSING="$MISSING XAI_API_KEY"
          [ -z "$STRIPE_SECRET_KEY" ] && MISSING="$MISSING STRIPE_SECRET_KEY"
          [ -z "$STRIPE_WEBHOOK_SECRET" ] && MISSING="$MISSING STRIPE_WEBHOOK_SECRET"
          [ -z "$CLOUDFLARE_API_TOKEN" ] && MISSING="$MISSING CLOUDFLARE_API_TOKEN"
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING="$MISSING CLOUDFLARE_ACCOUNT_ID"

          if [ -n "$MISSING" ]; then
            echo "::error::Missing required environment variables:$MISSING"
            exit 1
          fi

          echo "✅ All required production environment variables are set"

      - name: Check Preview Secrets
        if: github.ref == 'refs/heads/uat'
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_PREVIEW }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
        run: |
          MISSING=""

          [ -z "$NEXTAUTH_SECRET" ] && MISSING="$MISSING NEXTAUTH_SECRET_PREVIEW"
          [ -z "$DATABASE_URL" ] && MISSING="$MISSING DATABASE_URL_PREVIEW"

          if [ -n "$MISSING" ]; then
            echo "::warning::Missing preview environment variables:$MISSING"
          fi

          echo "✅ Preview environment variables checked"

  pr-env-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    name: PR Environment Diff

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Checkout Base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Compare env manifests
        id: diff
        run: |
          # Compare env manifests if they exist
          if [ -f "docs/env-manifest.json" ] && [ -f "base/docs/env-manifest.json" ]; then
            # Get new variables
            NEW_VARS=$(diff <(jq -r '.variables[].key' base/docs/env-manifest.json | sort) \
                           <(jq -r '.variables[].key' docs/env-manifest.json | sort) \
                      | grep "^>" | sed 's/^> //' | tr '\n' ', ' | sed 's/,$//')

            # Get removed variables
            REMOVED_VARS=$(diff <(jq -r '.variables[].key' base/docs/env-manifest.json | sort) \
                               <(jq -r '.variables[].key' docs/env-manifest.json | sort) \
                          | grep "^<" | sed 's/^< //' | tr '\n' ', ' | sed 's/,$//')

            if [ -n "$NEW_VARS" ] || [ -n "$REMOVED_VARS" ]; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "new_vars=$NEW_VARS" >> $GITHUB_OUTPUT
              echo "removed_vars=$REMOVED_VARS" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newVars = '${{ steps.diff.outputs.new_vars }}';
            const removedVars = '${{ steps.diff.outputs.removed_vars }}';

            let body = '## 🔐 Environment Variable Changes\n\n';

            if (newVars) {
              body += '### ➕ New Variables\n';
              body += newVars.split(',').map(v => `- \`${v.trim()}\``).join('\n');
              body += '\n\n';
            }

            if (removedVars) {
              body += '### ➖ Removed Variables\n';
              body += removedVars.split(',').map(v => `- \`${v.trim()}\``).join('\n');
              body += '\n\n';
            }

            body += '> ⚠️ Please ensure these changes are reflected in Vercel/Cloudflare environment settings before merging.';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
