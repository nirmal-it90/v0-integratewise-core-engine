# =============================================================================
# Unified Deploy Workflow - IntegrateWise Mono-Repo
# =============================================================================
# Consolidated deployment workflow for all apps:
# - Production: Triggered on push to main → integratewise.ai
# - Preview: Triggered on pull_request → os.integratewise.online
#
# Features:
# - Secrets preflight validation (fail fast)
# - Change detection (only deploy affected apps)
# - Shared build cache
# - Smoke tests after deployment
# - OIDC authentication where supported
#
# Apps:
# - @integratewise/os → Cloudflare Pages / Vercel
# - @integratewise/core-engine → Cloudflare Workers
# - @integratewise/hub → Vercel
# - @integratewise/webhooks → Cloudflare Workers
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (empty = auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - core-engine
          - hub
          - os
          - webhooks
          - all
      environment:
        description: 'Target environment'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

# Only one deploy at a time per ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  deployments: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ===========================================================================
  # Secrets Preflight: Validate all required secrets are present
  # ===========================================================================
  secrets-preflight:
    name: Secrets Preflight
    runs-on: ubuntu-latest
    outputs:
      validated: ${{ steps.validate.outputs.validated }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Required Secrets
        id: validate
        uses: ./.github/actions/validate-secrets
        with:
          required-secrets: >-
            NEXTAUTH_URL,
            NEXTAUTH_SECRET,
            GOOGLE_CLIENT_ID,
            GOOGLE_CLIENT_SECRET,
            DATABASE_URL,
            DATABASE_URL_UNPOOLED,
            XAI_API_KEY,
            STRIPE_SECRET_KEY,
            STRIPE_WEBHOOK_SECRET,
            CLOUDFLARE_API_TOKEN,
            CLOUDFLARE_ACCOUNT_ID
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ===========================================================================
  # Detect Changes: Determine which apps need deployment
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: secrets-preflight
    outputs:
      core-engine: ${{ steps.changes.outputs.core-engine }}
      hub: ${{ steps.changes.outputs.hub }}
      os: ${{ steps.changes.outputs.os }}
      webhooks: ${{ steps.changes.outputs.webhooks }}
      any-app: ${{ steps.changes.outputs.any-app }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=Production" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "production" ]; then
            echo "environment=Production" >> $GITHUB_OUTPUT
          else
            echo "environment=Preview" >> $GITHUB_OUTPUT
          fi

      - name: Check for manual override
        id: manual
        if: github.event_name == 'workflow_dispatch' && inputs.app != ''
        run: |
          APP="${{ inputs.app }}"
          if [ "$APP" = "all" ]; then
            echo "core-engine=true" >> $GITHUB_OUTPUT
            echo "hub=true" >> $GITHUB_OUTPUT
            echo "os=true" >> $GITHUB_OUTPUT
            echo "webhooks=true" >> $GITHUB_OUTPUT
            echo "any-app=true" >> $GITHUB_OUTPUT
          else
            echo "$APP=true" >> $GITHUB_OUTPUT
            echo "any-app=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect file changes
        if: github.event_name != 'workflow_dispatch' || inputs.app == ''
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core-engine:
              - 'apps/integratewise-core-engine/**'
              - 'packages/lib/**'
              - 'packages/types/**'
            hub:
              - 'apps/hub-frontend-app/**'
              - 'packages/ui/**'
              - 'packages/lib/**'
              - 'packages/types/**'
            os:
              - 'apps/integrationwise-os/**'
              - 'packages/ui/**'
              - 'packages/lib/**'
              - 'packages/types/**'
              - 'packages/config/**'
            webhooks:
              - 'apps/integratewise-webhooks/**'
              - 'packages/types/**'
              - 'packages/lib/**'

      - name: Set outputs
        id: changes
        run: |
          # Use manual override if set, otherwise use filter results
          CORE_ENGINE="${{ steps.manual.outputs.core-engine || steps.filter.outputs.core-engine || 'false' }}"
          HUB="${{ steps.manual.outputs.hub || steps.filter.outputs.hub || 'false' }}"
          OS="${{ steps.manual.outputs.os || steps.filter.outputs.os || 'false' }}"
          WEBHOOKS="${{ steps.manual.outputs.webhooks || steps.filter.outputs.webhooks || 'false' }}"
          
          echo "core-engine=$CORE_ENGINE" >> $GITHUB_OUTPUT
          echo "hub=$HUB" >> $GITHUB_OUTPUT
          echo "os=$OS" >> $GITHUB_OUTPUT
          echo "webhooks=$WEBHOOKS" >> $GITHUB_OUTPUT
          
          # Check if any app needs deploying
          if [ "${{ steps.manual.outputs.any-app }}" = "true" ] || \
             [ "$CORE_ENGINE" = "true" ] || \
             [ "$HUB" = "true" ] || \
             [ "$OS" = "true" ] || \
             [ "$WEBHOOKS" = "true" ]; then
            echo "any-app=true" >> $GITHUB_OUTPUT
          else
            echo "any-app=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Build: Shared build step for all apps
  # ===========================================================================
  build:
    name: Build
    needs: [secrets-preflight, detect-changes]
    if: needs.detect-changes.outputs.any-app == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/*' build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build affected apps
        run: |
          FILTERS=""
          
          if [ "${{ needs.detect-changes.outputs.core-engine }}" = "true" ]; then
            FILTERS="$FILTERS --filter @integratewise/core-engine"
          fi
          
          if [ "${{ needs.detect-changes.outputs.hub }}" = "true" ]; then
            FILTERS="$FILTERS --filter @integratewise/hub"
          fi
          
          if [ "${{ needs.detect-changes.outputs.os }}" = "true" ]; then
            FILTERS="$FILTERS --filter @integratewise/os"
          fi
          
          if [ -n "$FILTERS" ]; then
            pnpm $FILTERS build
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            **/node_modules
            packages/*/dist
            apps/*/.next
            apps/*/dist
          key: build-${{ github.sha }}

  # ===========================================================================
  # Deploy: IntegrateWise OS to Vercel
  # ===========================================================================
  deploy-os:
    name: Deploy OS
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.os == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.detect-changes.outputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
            packages/*/dist
            apps/*/.next
            apps/*/dist
          key: build-${{ github.sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ needs.detect-changes.outputs.environment }}" = "Production" ]; then
            URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          else
            URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        working-directory: apps/integrationwise-os
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ===========================================================================
  # Deploy: Core Engine to Cloudflare Workers
  # ===========================================================================
  deploy-core-engine:
    name: Deploy Core Engine
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.core-engine == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
            packages/*/dist
            apps/*/.next
            apps/*/dist
          key: build-${{ github.sha }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/integratewise-core-engine
          command: deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

  # ===========================================================================
  # Deploy: Hub Frontend to Vercel
  # ===========================================================================
  deploy-hub:
    name: Deploy Hub
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.hub == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
            packages/*/dist
            apps/*/.next
            apps/*/dist
          key: build-${{ github.sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ needs.detect-changes.outputs.environment }}" = "Production" ]; then
            URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          else
            URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        working-directory: apps/hub-frontend-app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HUB }}

  # ===========================================================================
  # Deploy: Webhooks Worker to Cloudflare Workers
  # ===========================================================================
  deploy-webhooks:
    name: Deploy Webhooks
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.webhooks == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            **/node_modules
            packages/*/dist
            apps/*/.next
            apps/*/dist
          key: build-${{ github.sha }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/integratewise-webhooks
          command: deploy

  # ===========================================================================
  # Smoke Tests: Verify deployment health
  # ===========================================================================
  smoke-tests:
    name: Smoke Tests
    needs: [detect-changes, deploy-os, deploy-hub, deploy-core-engine, deploy-webhooks]
    if: always() && (needs.deploy-os.result == 'success' || needs.deploy-hub.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine test URL
        id: url
        run: |
          if [ "${{ needs.detect-changes.outputs.environment }}" = "Production" ]; then
            echo "url=https://integratewise.ai" >> $GITHUB_OUTPUT
          else
            echo "url=${{ needs.deploy-os.outputs.url || needs.deploy-hub.outputs.url || 'https://os.integratewise.online' }}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        id: health
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Testing: $URL"
          
          # Try health endpoint first, fall back to root
          for endpoint in "/api/health" "/"; do
            FULL_URL="${URL}${endpoint}"
            echo "Checking: $FULL_URL"
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$FULL_URL" || echo "000")
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "✅ $endpoint returned $HTTP_CODE"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$HTTP_CODE" -ge 500 ]; then
              echo "❌ $endpoint returned $HTTP_CODE (5xx error)"
              echo "::error::Server error at $FULL_URL: HTTP $HTTP_CODE"
            else
              echo "⚠️ $endpoint returned $HTTP_CODE"
            fi
          done
          
          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "::error::Deployment health check failed"
          exit 1

      - name: Smoke test summary
        if: always()
        run: |
          echo "## 🔥 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.detect-changes.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: ${{ steps.health.outputs.healthy == 'true' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Deployment Summary
  # ===========================================================================
  summary:
    name: Summary
    needs: [detect-changes, deploy-os, deploy-hub, deploy-core-engine, deploy-webhooks, smoke-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.detect-changes.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Apps Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| IntegrateWise OS | ${{ needs.deploy-os.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hub Frontend | ${{ needs.deploy-hub.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Engine | ${{ needs.deploy-core-engine.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhooks Worker | ${{ needs.deploy-webhooks.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Post-Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          
          # Check for failures
          if [ "${{ needs.deploy-os.result }}" = "failure" ] || \
             [ "${{ needs.deploy-hub.result }}" = "failure" ] || \
             [ "${{ needs.deploy-core-engine.result }}" = "failure" ] || \
             [ "${{ needs.deploy-webhooks.result }}" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **One or more deployments failed. Check logs above.**" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.smoke-tests.result }}" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Smoke tests failed! Deployment may be unhealthy.**" >> $GITHUB_STEP_SUMMARY
          fi
